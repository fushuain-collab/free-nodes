name: Update Free Nodes
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 collect.py
      - name: Commit & Push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/fushuain-collab/free-nodes.git
          git add sub.txt
          git diff --cached --quiet || git commit -m "Auto update $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
